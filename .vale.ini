StylesPath = styles
MinAlertLevel = suggestion
Vocab = Gamebook

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells.zip

# Treat Quarto .qmd as Markdown so articles/primers are linted (Phase-4 pilot fix).
[formats]
qmd = md

[*.{md,qmd}]
BasedOnStyles = Vale, ai-tells, Gamebook

# Specific overrides or additions
Gamebook.Provenance = error
Gamebook.NoEmDash = error
Gamebook.Terms = error
Gamebook.NoForwardRefs = error
ai-tells.EmDashUsage = NO
Vale.Terms = NO

# The Glossary & Index is generated reference content (scripts/glossary.py): it
# lists aliases by design (so Gamebook.Terms must not fire) and mirrors the
# registry's terse definitions (not authored prose, so ai-tells does not apply).
# Keep base spelling and the em-dash ban.
[content/glossary.qmd]
BasedOnStyles = Vale, Gamebook
Gamebook.Terms = NO

# The per-family Works & References pages (one per family part) are generated
# reference apparatus: ludography + bibliography lists of credited works and
# texts, plus a web-only research-basis trail. They list work and author names
# (which collide with canonical terms, so Gamebook.Terms must not fire) and are
# citation lines, not authored prose (so ai-tells does not apply). Keep the
# em-dash ban and base spelling.
[content/credits/*.qmd]
BasedOnStyles = Vale, Gamebook
Gamebook.Terms = NO
# Ludography and bibliography lines are dense with designer, studio and author
# names from many languages; Vale.Spelling would be almost all false positives,
# and Vale.Repetition fires on legitimate titles (e.g. "You Me Bum Bum Train")
# and repeated author initials.
Vale.Spelling = NO
Vale.Repetition = NO
