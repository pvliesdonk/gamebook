StylesPath = styles
MinAlertLevel = suggestion
Vocab = Gamebook

Packages = https://github.com/tbhb/vale-ai-tells/releases/download/v1.6.3/ai-tells.zip

# Treat Quarto .qmd as Markdown so articles/primers are linted (Phase-4 pilot fix).
[formats]
qmd = md

[*.{md,qmd}]
BasedOnStyles = Vale, ai-tells, Gamebook

# Specific overrides or additions
Gamebook.Provenance = error
Gamebook.NoEmDash = error
Gamebook.Terms = error
Gamebook.NoForwardRefs = error
ai-tells.EmDashUsage = NO
Vale.Terms = NO

# The Glossary & Index is generated reference content (scripts/glossary.py): it
# lists aliases by design (so Gamebook.Terms must not fire) and mirrors the
# registry's terse definitions (not authored prose, so ai-tells does not apply).
# Keep base spelling and the em-dash ban.
[content/glossary.qmd]
BasedOnStyles = Vale, Gamebook
Gamebook.Terms = NO
