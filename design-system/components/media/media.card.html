<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 22px 24px; }
  .lab { font-family: var(--font-label); font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 12px; }
  .icons { display: flex; gap: 20px; flex-wrap: wrap; color: var(--ink-soft); margin-bottom: 24px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; width: 56px; }
  .ic small { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
  .badges { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 26px; }
  .plates { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Icon, MediaBadge, IllustrationPlate } = window.FieldGuideDesignSystem_df43d1;
  const sections = ['structure','puzzles','story','players','space','systems'];
  const ui = ['search','map','list','feather','corner-down-right','arrow-right'];
  function Demo() {
    return (
      <div>
        <div className="lab">Families &amp; UI glyphs · Phosphor Thin</div>
        <div className="icons">
          {sections.concat(ui).map((n) => (
            <div className="ic" key={n}><Icon name={n} size={22} /><small>{n}</small></div>
          ))}
        </div>
        <div className="lab">Media badges · icon, not dot</div>
        <div className="badges">
          <MediaBadge media="if" />
          <MediaBadge media="live" />
          <MediaBadge media="tabletop" />
          <MediaBadge media="hunt" solid />
        </div>
        <div className="lab">Illustration plates · placeholders until art is generated</div>
        <div className="plates">
          <IllustrationPlate figure="Fig. 14" caption="The locked diorama." tone="moss" />
          <IllustrationPlate figure="Fig. 22" caption="The architecture of dread." tone="clay" />
          <IllustrationPlate figure="Fig. 2" caption="The magic circle." tone="slate" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
