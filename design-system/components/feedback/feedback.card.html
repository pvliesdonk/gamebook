<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { padding: 20px 24px; }
  .cols { display: grid; grid-template-columns: 1fr 248px; gap: 30px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .cap { font-family: var(--font-sans); font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 9px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Callout } = window.FieldGuideDesignSystem_df43d1;
  function Demo() {
    return (
      <div className="cols">
        <div>
          <div className="cap">Inline — in the text column</div>
          <div className="stack">
            <Callout kind="fieldnote">
              Reveal the lock before the key. A player who knows what they are solving for will read every clue twice as hard.
            </Callout>
            <Callout kind="hazard">
              The guess-the-verb wall: a solution exists, but the parser refuses every word the player actually types.
            </Callout>
            <Callout kind="specimen" title="Return of the Obra Dinn">
              Every death is its own locked diorama — the player is handed the cast and the corpse, and must read the scene as evidence.
            </Callout>
          </div>
        </div>
        <div>
          <div className="cap">Sidebar — for a print margin</div>
          <Callout kind="hazard" sidebar title="Failure Mode">
            When every beat pays out at the same volume, the player re-tunes and the tension is never felt again.
          </Callout>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
