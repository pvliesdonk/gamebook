<!-- @dsCard group="Colors" viewport="700x172" name="Amber Accent" subtitle="The one settled accent — warm amber, used sparingly" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .sw { width: 116px; }
  .chip { height: 60px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-label); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-body); margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .dot { font-size: 10px; color: var(--text-faint); }
  .use { width: 184px; align-self: stretch; padding-left: 12px; border-left: 1px solid var(--border-hairline); }
  .use p { font-size: 14px; margin: 0; line-height: 1.55; color: var(--text-muted); }
  .use a { font-style: normal; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#c07840"></div><div class="name">Amber <span class="dot">· settled</span></div><div class="hex">#C07840</div></div>
    <div class="sw"><div class="chip" style="background:#a25f2c"></div><div class="name">Amber Deep</div><div class="hex">#A25F2C</div></div>
    <div class="sw"><div class="chip" style="background:#7f4a20"></div><div class="name">Amber Ink</div><div class="hex">#7F4A20</div></div>
    <div class="sw"><div class="chip" style="background:#f0e1cf"></div><div class="name">Amber Tint</div><div class="hex">#F0E1CF</div></div>
    <div class="use"><p>Amber is the entire accent. It carries <a href="#">links</a>, the active filter, the plate top-rule. Never as a fill behind body text.</p></div>
  </div>
</body>
</html>
