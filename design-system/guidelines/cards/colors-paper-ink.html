<!-- @dsCard group="Colors" viewport="700x172" name="Paper & Ink" subtitle="The settled base — warm cream paper, near-black ink" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px 24px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 104px; }
  .chip { height: 60px; border-radius: var(--radius-sm); border: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-label); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-body); margin-top: 7px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .dot { font-size: 10px; color: var(--text-faint); font-family: var(--font-label); letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#fafafa"></div><div class="name">Paper <span class="dot">· settled</span></div><div class="hex">#FAFAFA</div></div>
    <div class="sw"><div class="chip" style="background:#f5f1e9"></div><div class="name">Paper Warm</div><div class="hex">#F5F1E9</div></div>
    <div class="sw"><div class="chip" style="background:#ece5d7"></div><div class="name">Paper Deep</div><div class="hex">#ECE5D7</div></div>
    <div class="sw"><div class="chip" style="background:#1a1a1a"></div><div class="name">Ink <span class="dot">· settled</span></div><div class="hex">#1A1A1A</div></div>
    <div class="sw"><div class="chip" style="background:#2c2824"></div><div class="name">Ink Soft</div><div class="hex">#2C2824</div></div>
    <div class="sw"><div class="chip" style="background:#6b6155"></div><div class="name">Ink Muted</div><div class="hex">#6B6155</div></div>
    <div class="sw"><div class="chip" style="background:#968b7c"></div><div class="name">Ink Faint</div><div class="hex">#968B7C</div></div>
  </div>
</body>
</html>
