<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 22px 28px; display: flex; flex-direction: column; gap: 15px; }
  .lab { font-family: var(--font-sans); text-transform: uppercase; font-weight: 600; letter-spacing: .09em; color: var(--text-muted); }
  .big { font-size: 13px; color: var(--ink); }
  .row { display: flex; gap: 26px; align-items: baseline; flex-wrap: wrap; }
  .ui { font-family: var(--font-sans-text); font-size: 15px; color: var(--ink-soft); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="lab big">Mechanism · Atmosphere · Cluing</div>
  <div class="row">
    <span class="lab" style="font-size:11px">Patterns</span>
    <span class="lab" style="font-size:11px">Failure Modes</span>
    <span class="lab" style="font-size:11px">Referenced By</span>
    <span class="lab" style="font-size:11px">Field Note</span>
  </div>
  <div class="ui">Cronos Text sets larger UI — buttons, menus, running labels — beside Jenson without a seam.</div>
  <div class="meta">Cronos Pro · Caption master for small labels · 600 · UPPERCASE · tracking 0.09em</div>
</body>
</html>
