<!-- @dsCard group="Colors" viewport="700x200" name="Botanical Inks" subtitle="Desaturated secondary pigments for callouts, tabs & provenance" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .col .name { font-family: var(--font-label); font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-body); margin-bottom: 7px; }
  .role { font-family: var(--font-label); font-size: 10px; letter-spacing: .03em; color: var(--text-faint); margin-bottom: 8px; font-style: normal; }
  .stack { display: flex; flex-direction: column; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border-hairline); }
  .band { height: 26px; display: flex; align-items: center; padding: 0 8px; font-family: var(--font-mono); font-size: 10px; }
  .band.t { color: var(--ink-soft); }
  .band.d { color: #fff; }
</style>
</head>
<body>
  <div class="grid">
    <div class="col"><div class="name">Moss</div><div class="role">The Specimen</div><div class="stack"><div class="band d" style="background:#5d6b3f">#5D6B3F</div><div class="band t" style="background:#e6e8d6">tint</div><div class="band t" style="background:#c3cba0">edge</div></div></div>
    <div class="col"><div class="name">Slate</div><div class="role">The Field Note</div><div class="stack"><div class="band d" style="background:#3f6168">#3F6168</div><div class="band t" style="background:#dde7e8">tint</div><div class="band t" style="background:#a9c4c6">edge</div></div></div>
    <div class="col"><div class="name">Clay</div><div class="role">The Hazard</div><div class="stack"><div class="band d" style="background:#a0492f">#A0492F</div><div class="band t" style="background:#f1ddd3">tint</div><div class="band t" style="background:#dcab97">edge</div></div></div>
    <div class="col"><div class="name">Ochre</div><div class="role">Puzzle-hunt</div><div class="stack"><div class="band d" style="background:#b08a2e">#B08A2E</div><div class="band t" style="background:#f0e7cc">tint</div><div class="band t" style="background:#ddc585">edge</div></div></div>
  </div>
</body>
</html>
