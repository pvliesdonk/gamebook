<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base — inline gaps to part breaks" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 22px 28px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .u { text-align: center; }
  .bar { background: var(--amber); border-radius: 1px 1px 0 0; width: 30px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="bar" style="height:4px"></div><div class="n">1</div><div class="v">4</div></div>
    <div class="u"><div class="bar" style="height:8px"></div><div class="n">2</div><div class="v">8</div></div>
    <div class="u"><div class="bar" style="height:12px"></div><div class="n">3</div><div class="v">12</div></div>
    <div class="u"><div class="bar" style="height:16px"></div><div class="n">4</div><div class="v">16</div></div>
    <div class="u"><div class="bar" style="height:24px"></div><div class="n">5</div><div class="v">24</div></div>
    <div class="u"><div class="bar" style="height:32px"></div><div class="n">6</div><div class="v">32</div></div>
    <div class="u"><div class="bar" style="height:48px"></div><div class="n">7</div><div class="v">48</div></div>
    <div class="u"><div class="bar" style="height:64px"></div><div class="n">8</div><div class="v">64</div></div>
  </div>
</body>
</html>
