<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 26px 30px; }
  .plate { border-top: 2px solid var(--amber); padding-top: 14px; max-width: 560px; }
  .kick { display: flex; align-items: baseline; gap: 12px; }
  .no { font-family: var(--font-mono); font-size: 12px; color: var(--amber-ink); letter-spacing: .04em; }
  .tax { font-family: var(--font-label); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: var(--text-muted); }
  h1 { font-size: 38px; margin: 8px 0 6px; }
  .sil { font-family: var(--font-serif); font-style: italic; font-size: 20px; color: var(--ink-soft); line-height: 1.3; margin: 0; }
</style>
</head>
<body>
  <div class="plate">
    <div class="kick"><span class="no">№ 14</span><span class="tax">Puzzles · Cluing & Information</span></div>
    <h1>The Fairness Contract</h1>
    <p class="sil">The unspoken promise that every locked door has a findable key.</p>
  </div>
</body>
</html>
