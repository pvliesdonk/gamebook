name: pages

# Deploy the HTML wiki to GitHub Pages on every push to main, so the live site
# (https://pvliesdonk.github.io/gamebook/) always tracks the source. Versioned
# downloadables (PDF + EPUB) ship via release.yml on tags. The wiki renders on
# the free web fonts; the licensed faces are not needed (and are gitignored).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; let an in-flight run finish (don't cancel a deploy)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python dependencies for the pre-render scripts
        run: pip install pyyaml

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render the HTML wiki
        run: quarto render --to html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _book

      - id: deployment
        uses: actions/deploy-pages@v4
