name: release

# On a v* tag: build the curated PDF + EPUB and attach them to the GitHub
# Release for that tag. The live wiki is deployed separately by pages.yml.
# Builds on the bundled OFL fallback fonts (the licensed faces are gitignored
# and not needed); the EPUB is validated with epubcheck before release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python dependencies for the pre-render scripts
        run: pip install pyyaml

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # `quarto render` (no --to) builds every configured format into _book/
      - name: Build PDF + EPUB (+ wiki)
        run: quarto render

      - name: Validate the EPUB (epubcheck)
        run: |
          EPUBCHECK_VERSION=5.1.0
          curl -sSL -o epubcheck.zip \
            "https://github.com/w3c/epubcheck/releases/download/v${EPUBCHECK_VERSION}/epubcheck-${EPUBCHECK_VERSION}.zip"
          unzip -q epubcheck.zip
          java -jar "epubcheck-${EPUBCHECK_VERSION}/epubcheck.jar" _book/*.epub

      - name: Stage release assets with stable names
        run: |
          mkdir -p dist
          cp _book/*.pdf  "dist/Field-Guide-to-Narrative-and-Game-Design.pdf"
          cp _book/*.epub "dist/Field-Guide-to-Narrative-and-Game-Design.epub"
          ls -lh dist

      - name: Create / update the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
