format:
  html:
    theme:
      - cosmo
      - brand
  typst:
    mainfont: "Adobe Jenson Pro"
    monofont: "Letter Gothic Std"
    font-paths:
      - assets/fonts
    template-partials:
      - partials/page.typ
      - partials/typst-show.typ
    include-in-header:
      - typst/field-guide.typ
    filters:
      - filters/field-guide.lua
  epub: default
